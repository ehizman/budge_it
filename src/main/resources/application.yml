spring:
  application:
    name: budge_it

  # ?? DATABASE ????????????????????????????????????????????????????
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000

  jpa:
    hibernate:
      ddl-auto: validate          # Flyway owns the schema ? never let Hibernate modify it
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public
        jdbc:
          time_zone: UTC

  # ?? FLYWAY ??????????????????????????????????????????????????????
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

  # ?? ACTUATOR ?????????????????????????????????????????????????????
  management:
    endpoints:
      web:
        exposure:
          include: health,info,metrics,flyway
    endpoint:
      health:
        show-details: when-authorized
    info:
      env:
        enabled: true


# ?? LOGGING ??????????????????????????????????????????????????????
logging:
  level:
    root: INFO
    com.relab.budge_it: DEBUG
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# ?? APP SECURITY ?????????????????????????????????????????????????
app:
  security:
    jwt:
      secret: ${JWT_SECRET}              # Min 64 chars, base64-encoded
      access-token-expiry-seconds: 900   # 15 minutes
      refresh-token-expiry-days: 30
    webhook:
      relab-mfb-secret: ${WEBHOOK_HMAC_SECRET}


server:
  port: 9090


