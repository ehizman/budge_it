version: '3.9'

services:

  postgres:
    image: postgres:16
    container_name: budgeit-db
    environment:
      POSTGRES_DB: bugdeit
      POSTGRES_USER: relab
      POSTGRES_PASSWORD: S3cret
    ports:
      - "5432:5432"
    volumes:
      - bugdeit_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U relab -d relab_budget"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: bugdeit-cache
    ports:
      - "6379:6379"
    volumes:
      - bugdeit_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  bugdeit_pg_data:
  bugdeit_redis_data:
