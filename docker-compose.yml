services:

  postgres:
    image: postgres:16
    container_name: budgeit-db
    environment:
      POSTGRES_DB: budgeit
      POSTGRES_USER: relab
      POSTGRES_PASSWORD: S3cret
    ports:
      - "5432:5432"
    volumes:
      - bugdeit_pg_data:/var/lib/postgresql/data
    networks:
      budgeit_net:

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U relab -d budgeit"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: bugdeit-cache
    ports:
      - "6379:6379"
    volumes:
      - bugdeit_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      budgeit_net:

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: budgeit-app
    env_file:
      - .env.dev
    environment:
      # Override localhost refs with Docker service names
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "9090:9090"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      budgeit_net:

volumes:
  bugdeit_pg_data:
  bugdeit_redis_data:

networks:
  budgeit_net:
    driver: bridge